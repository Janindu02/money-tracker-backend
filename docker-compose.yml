version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finova
      POSTGRES_PASSWORD: finova_secret
      POSTGRES_DB: finova_db
    ports:
      - '5434:5432'
    volumes:
      - finova_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finova -d finova_db']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finova-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://finova:finova_secret@postgres:5432/finova_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  finova_pg_data:
